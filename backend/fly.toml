# Fly.io deployment config for FoodGrump API
# Deploy: cd backend && fly deploy
# Docs: https://fly.io/docs/reference/configuration/

app = "foodgrump-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "sh -c 'PYTHONPATH=/app alembic upgrade head'"

[env]
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/"

[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
  worker = "celery -A app.celery_app.celery worker --loglevel=info --concurrency=2"
  beat = "celery -A app.celery_app.celery beat --loglevel=info"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
